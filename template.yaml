AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Twins document classifier API

Globals:
  Function:
    Runtime: python3.13
    Timeout: 300
    MemorySize: 2048
    Architectures:
      - x86_64
    EphemeralStorage:
      Size: 1024
    Environment:
      Variables:
#        AWS_REGION: ap-southeast-2
        BEDROCK_MODEL_ID: anthropic.claude-3-haiku-20240307-v1:0
        MAX_TOKENS: "5000"
        TEMPERATURE: "0"
        CONCURRENCY: "5"
        TEXTRACT_SNS_TOPIC_ARN: arn:aws:sns:ap-southeast-2:117134819170:twins-textract-complete-topic
        TEXTRACT_SNS_ROLE_ARN: arn:aws:iam::117134819170:role/service-role/sns-publisher-role-t22l2yc9
        TEXTRACT_RESULTS_BUCKET: twins-lambdas

Resources:
  TwinsHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

  TwinsDocumentClassifierFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: twins-document-classifier-api
      CodeUri: twins_textract/
      Handler: app.handler
      Role: arn:aws:iam::117134819170:role/Bedrock-LambdaRolejp
      Events:
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref TwinsHttpApi
            Path: /
            Method: ANY
        Proxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref TwinsHttpApi
            Path: /{proxy+}
            Method: ANY

  TwinsTextractCollectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: twins-textract-sns-collector
      CodeUri: twins_textract/
      Handler: sns_collector.handler
      Role: arn:aws:iam::117134819170:role/Bedrock-LambdaRolejp
      Events:
        TextractCompleted:
          Type: SNS
          Properties:
            Topic: arn:aws:sns:ap-southeast-2:117134819170:twins-textract-complete-topic

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${TwinsHttpApi}.execute-api.${AWS::Region}.amazonaws.com"