AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Twins document classifier API

Globals:
  Function:
    Runtime: python3.12
    Timeout: 300
    MemorySize: 2048
    Architectures:
      - arm64
    EphemeralStorage:
      Size: 1024
    Environment:
      Variables:
#        AWS_REGION: ap-southeast-2
        BEDROCK_MODEL_ID: anthropic.claude-3-haiku-20240307-v1:0
        MAX_TOKENS: "5000"
        TEMPERATURE: "0"
        CONCURRENCY: "5"

Resources:
  TwinsHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

  TwinsDocumentClassifierFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: twins-document-classifier-api
      CodeUri: twins_textract/
      Handler: app.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource: "*"
            - Effect: Allow
              Action:
                - textract:DetectDocumentText
                - textract:AnalyzeDocument
                - textract:StartDocumentTextDetection
                - textract:GetDocumentTextDetection
                - textract:StartDocumentAnalysis
                - textract:GetDocumentAnalysis
              Resource: "*"
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
      Events:
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref TwinsHttpApi
            Path: /
            Method: ANY
        Proxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref TwinsHttpApi
            Path: /{proxy+}
            Method: ANY

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${TwinsHttpApi}.execute-api.${AWS::Region}.amazonaws.com"